<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🌍 Quiz-Trainer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="brand">🌍 Quiz-Trainer</div>
        <nav id="nav"></nav>
        <div id="zones">
          <h3>🌍 Régions à réviser</h3>
          <div id="zone-list"></div>
        </div>
        <div id="sidebar-foot">
          <button id="reset">Réinitialiser ma progression</button>
        </div>
      </aside>

      <main id="main">
        <section id="game" class="view" hidden>
          <div class="ghead">
            <h1 id="g-title"></h1>
            <span id="g-sub"></span>
          </div>
          <div id="prompt" class="prompt"></div>
          <div id="stim" class="stim"><div id="map"></div></div>
          <div id="options" class="options"></div>
          <div id="feedback" class="feedback"></div>
          <div id="session" class="session"></div>
        </section>

        <section id="dashboard" class="view" hidden></section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
